name: Cloudflare WAF Validation with OPA

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  TF_CLOUD_ORGANIZATION: "infra-aymeric-cfd"
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      requires_approval: ${{ steps.override_check.outputs.requires_approval }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "1.6.0"

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Run OPA Tests
        id: opa_test
        run: |
          echo "Running OPA policy tests..."
          opa test policies/ -v
          echo "✅ OPA tests passed"

      - name: Terraform Plan
        id: plan
        run: |
          PLAN_OUTPUT=$(terraform plan -no-color 2>&1)
          echo "$PLAN_OUTPUT"
          RUN_ID=$(echo "$PLAN_OUTPUT" | grep -o 'run-[A-Za-z0-9]*' | head -1)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Download Plan JSON from Terraform Cloud
        id: download_plan
        run: |
          RUN_ID="${{ steps.plan.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            echo "⚠️  No run ID captured, skipping plan JSON download"
            exit 0
          fi

          RUN_DATA=$(curl -s \
            -H "Authorization: Bearer $TF_API_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/runs/$RUN_ID")

          PLAN_ID=$(echo "$RUN_DATA" | jq -r '.data.relationships.plan.data.id')
          PLAN_STATUS=$(echo "$RUN_DATA" | jq -r '.data.attributes.status')
          echo "Run status: $PLAN_STATUS"
          echo "Plan ID: $PLAN_ID"

          # Wait for plan to reach a finished state if still in progress
          for i in $(seq 1 10); do
            PLAN_STATUS=$(curl -s \
              -H "Authorization: Bearer $TF_API_TOKEN" \
              "https://app.terraform.io/api/v2/plans/$PLAN_ID" \
              | jq -r '.data.attributes.status')
            echo "Plan status (attempt $i): $PLAN_STATUS"
            [ "$PLAN_STATUS" = "finished" ] && break
            sleep 5
          done

          HTTP_STATUS=$(curl -sL -o tfplan.json -w "%{http_code}" \
            -H "Authorization: Bearer $TF_API_TOKEN" \
            "https://app.terraform.io/api/v2/plans/$PLAN_ID/json-output")

          echo "HTTP status for json-output: $HTTP_STATUS"
          [ -s tfplan.json ] && echo "✅ Plan JSON downloaded" || echo "⚠️  Plan JSON empty or unavailable"
        continue-on-error: true

      - name: Check for Managed Ruleset Overrides
        id: override_check
        run: |
          if [ ! -f tfplan.json ]; then
            echo "requires_approval=false" >> $GITHUB_OUTPUT
            echo "⚠️  No plan file found, skipping override check"
            exit 0
          fi
          APPROVAL_OUTPUT=$(opa eval -i tfplan.json -d policies/waf_required.rego "data.terraform.requires_approval" --format pretty)
          if echo "$APPROVAL_OUTPUT" | grep -q "APPROVAL REQUIRED"; then
            echo "requires_approval=true" >> $GITHUB_OUTPUT
            echo "⚠️  Managed ruleset overrides detected - additional approval will be required before apply"
          else
            echo "requires_approval=false" >> $GITHUB_OUTPUT
            echo "✅ No managed ruleset overrides detected"
          fi

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### OPA Policy Tests 📋\`${{ steps.opa_test.outcome }}\`
            #### WAF Exception/Override Check 🔒\`${{ steps.override_check.outputs.requires_approval == 'true' && '⚠️ Approval Required' || '✅ None Detected' }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            **Pusher:** @${{ github.actor }}
            **Action:** ${{ github.event_name }}
            **Workflow:** ${{ github.workflow }}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  security-review-waf-change:
    name: Security Review - WAF Exception or Override
    needs: validate
    if: needs.validate.outputs.requires_approval == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: waf-security-review
    steps:
      - name: Change Approved
        run: echo "✅ WAF exception or override reviewed and approved"

  apply:
    name: Terraform Apply
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
