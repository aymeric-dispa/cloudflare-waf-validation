name: Cloudflare WAF Validation with OPA

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  TF_CLOUD_ORGANIZATION: "infra-aymeric-cfd"
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      requires_approval: ${{ steps.override_check.outputs.requires_approval }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "1.6.0"

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Run OPA Tests
        id: opa_test
        run: |
          echo "Running OPA policy tests..."
          opa test policies/ -v
          echo "✅ OPA tests passed"

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          terraform plan -no-color -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json
        continue-on-error: true

      - name: Upload Plan Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan.binary
          retention-days: 1

      - name: Check for Managed Ruleset Overrides
        id: override_check
        run: |
          if [ ! -f tfplan.json ]; then
            echo "requires_approval=false" >> $GITHUB_OUTPUT
            echo "⚠️  No plan file found, skipping override check"
            exit 0
          fi
          APPROVAL_OUTPUT=$(opa eval -i tfplan.json -d policies/waf_required.rego "data.terraform.requires_approval" --format pretty)
          if echo "$APPROVAL_OUTPUT" | grep -q "APPROVAL REQUIRED"; then
            echo "requires_approval=true" >> $GITHUB_OUTPUT
            echo "⚠️  Managed ruleset overrides detected - additional approval will be required before apply"
          else
            echo "requires_approval=false" >> $GITHUB_OUTPUT
            echo "✅ No managed ruleset overrides detected"
          fi

      - name: Validate Plan with OPA
        id: opa_eval
        run: |
          echo "Evaluating Terraform plan against OPA policies..."
          
          # Check for policy violations (deny rules)
          DENY_OUTPUT=$(opa eval -i tfplan.json -d policies/waf_required.rego "data.terraform.deny" --format pretty)
          echo "Deny evaluation result:"
          echo "$DENY_OUTPUT"
          
          # Check for warnings
          WARN_OUTPUT=$(opa eval -i tfplan.json -d policies/waf_required.rego "data.terraform.warn" --format pretty)
          echo "Warning evaluation result:"
          echo "$WARN_OUTPUT"
          
          # If deny output contains violations, fail the check
          if echo "$DENY_OUTPUT" | grep -q "POLICY VIOLATION"; then
            echo "❌ OPA policy violations found!"
            echo "$DENY_OUTPUT"
            exit 1
          fi
          
          echo "✅ OPA policy validation passed"
          
          # Display warnings if any
          if echo "$WARN_OUTPUT" | grep -q "WARNING"; then
            echo "⚠️  Warnings found:"
            echo "$WARN_OUTPUT"
          fi

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### OPA Policy Tests 📋\`${{ steps.opa_test.outcome }}\`
            #### OPA Policy Validation 🔒\`${{ steps.opa_eval.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            **Pusher:** @${{ github.actor }}
            **Action:** ${{ github.event_name }}
            **Workflow:** ${{ github.workflow }}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  security-review-override:
    name: Security Review - Managed Ruleset Override
    needs: validate
    if: needs.validate.outputs.requires_approval == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: managed-ruleset-override
    steps:
      - name: Override Approved
        run: echo "✅ Managed ruleset override reviewed and approved"

  apply:
    name: Terraform Apply
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: "1.6.0"

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply tfplan.binary

      - name: Output Results
        run: terraform output -json
